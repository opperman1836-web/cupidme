# Render.com deployment configuration for CupidMe API
# Deploy: connect your GitHub repo, Render auto-detects this file

services:
  - type: web
    name: cupidme-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # NOTE: JWT_SECRET removed — auth uses Supabase JWTs exclusively
